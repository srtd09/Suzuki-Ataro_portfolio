  </div>

<!-- 物語 -->
<div class="story-box">

  <p>
    旅人が丘を歩いていると、空の色がふっと変わった。
  </p>

  <p>
    見上げると、無数の小さな魚が、渡り鳥の群れのように空を泳いでいた。
  </p>

  <p>
    碧い鱗が夕陽を受けてきらめき、風の流れに合わせて形を変えながら進んでいく。
  </p>

  <p>
    この地方では、空を泳ぐ魚が現れると季節が変わると言われていた。
  </p>

  <p>
    旅人はその群れの動きから、言葉より確かな“時の気配”を感じ取った。
  </p>

  <p>
    魚たちは一度だけ旅人の頭上を旋回し、
    まるで挨拶するように光を散らして、遠くの空へ消えていった。
  </p>

  <p>
    風がひとつ吹き抜けた。<br>
    その冷たさで、旅人は気づく。
  </p>

  <p class="center">――季節が、ひとつ動いたのだ。</p>
